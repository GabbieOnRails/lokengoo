<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Court Collection</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when polyfills try to overwrite the restricted window.fetch property.
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: () => originalFetch,
            set: () => {
              console.warn('Attempt to overwrite window.fetch ignored to prevent crash.');
            }
          });
        }
      } catch (e) {
        console.error('Failed to apply fetch guard:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
